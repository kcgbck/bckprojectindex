name: Update Laws Data

on:
  schedule:
    # 🕒 한국 시간 밤 11시에 실행 (UTC 기준 14:00)
    - cron: '0 14 * * *'
  workflow_dispatch: # 수동 실행 버튼 생성

permissions:
  contents: write
  issues: write  # 실패 시 이슈 생성을 위해 필요

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 내 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 환경 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 법령 데이터 갱신 스크립트 실행
        id: run_update
        env:
          LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
        run: node update_laws.js

      - name: 만들어진 JSON 파일을 GitHub에 저장(Commit)
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add laws_data.json laws_fetch_failures.json 2>/dev/null || git add laws_data.json
          git commit -m "법령 데이터 자동 업데이트" || exit 0
          git push

      # 실패 파일이 존재하면 이슈 생성
      - name: 법령 fetch 실패 시 GitHub 이슈 생성
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f laws_fetch_failures.json ]; then
            echo "실패 없음 - 이슈 생성 건너뜀"
            exit 0
          fi

          FAIL_COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('laws_fetch_failures.json')); console.log(d.failCount);")
          SUCCESS_RATE=$(node -e "const d=JSON.parse(require('fs').readFileSync('laws_fetch_failures.json')); console.log(d.successRate);")
          FAIL_LIST=$(node -e "const d=JSON.parse(require('fs').readFileSync('laws_fetch_failures.json')); d.failedLaws.forEach(n=>console.log('- '+n));")
          DATE=$(node -e "console.log(new Date().toLocaleString('ko-KR', {timeZone:'Asia/Seoul'}))")

          TITLE="[법령 DB 업데이트 실패] ${FAIL_COUNT}개 법령 수집 실패 (성공률 ${SUCCESS_RATE}%)"
          BODY="## ⚠️ 법령 데이터 자동 갱신 중 오류 발생

          **발생 시각:** ${DATE}
          **성공률:** ${SUCCESS_RATE}%
          **실패 법령 수:** ${FAIL_COUNT}개

          ### 실패한 법령 목록
          ${FAIL_LIST}

          ### 조치 방법
          1. law.go.kr API 서버 상태 확인
          2. \`Update update.yml\` 워크플로를 수동 재실행
          3. 반복 실패 시 API URL 또는 ID 변경 여부 확인"

          gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            --label "bug" \
            --assignee "kcgbck" \
            2>/dev/null || echo "이슈 생성 실패 (레이블/담당자 없음 - 무시)"

          # 레이블 없이 재시도
          gh issue create \
            --title "$TITLE" \
            --body "$BODY" \
            2>/dev/null || echo "이슈 생성 완료 또는 실패"
