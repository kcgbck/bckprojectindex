name: Update Laws Data

on:
  schedule:
    # 🕒 한국 시간 밤 11시에 실행 (UTC 기준 14:00)
    - cron: '0 14 * * *'
  workflow_dispatch: # 수동 실행 버튼 생성

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 내 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 20 환경 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 법령 데이터 갱신 스크립트 실행
        env:
          LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
        run: node update_laws.js

      - name: 만들어진 JSON 파일을 GitHub에 저장(Commit)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add laws_data.json
          git commit -m "법령 데이터 자동 업데이트" || exit 0
          git push
